name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: ${{ github.repository == 'rhinoc/douvo' || github.event_name == 'pull_request' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Swift build
        run: swift build -v

      - name: Validate app metadata and scripts
        run: |
          bash -n scripts/build-app.sh
          bash -n scripts/ensure-local-code-signing-identity.sh
          bash -n scripts/install-dev-app.sh
          plutil -lint Sources/Douvo/Info.plist

      - name: Import code signing identity
        if: github.repository == 'rhinoc/douvo' && github.event_name != 'pull_request'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: scripts/code-sign-import.sh

      - name: Build app bundle
        if: github.repository == 'rhinoc/douvo' && github.event_name != 'pull_request'
        run: scripts/build-app.sh
