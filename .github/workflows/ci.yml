name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: ${{ github.repository == 'rhinoc/douvo' || github.event_name == 'pull_request' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Swift build
        run: swift build -v

      - name: Validate app metadata and scripts
        run: |
          bash -n scripts/build-app.sh
          bash -n scripts/ensure-local-code-signing-identity.sh
          bash -n scripts/install-dev-app.sh
          plutil -lint Sources/Douvo/Info.plist

